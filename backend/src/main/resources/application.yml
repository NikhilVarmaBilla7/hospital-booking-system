server:
  port: 8080

spring:
  application:
    name: hospital-booking-system
  datasource:
    url: jdbc:h2:mem:hospitaldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# App Security Settings
app:
  jwt:
    secret: 9a62a9ca17df146d9a117b3f2c52bb3522f281e285a8637e1df2ef562d9894e2 # 256-bit key
    expiration-ms: 86400000 # 24 hours
  gemini:
    api-key: ${GEMINI_API_KEY:your-api-key-here} # Set GEMINI_API_KEY environment variable
